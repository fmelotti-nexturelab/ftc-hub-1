services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./backend:/app
      - attachments_data:/data/attachments
      - D:/:/mnt/f
      # Vedi nota nel base: il router agent-installer legge da /navision_agent
      - ./navision_agent:/navision_agent:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    command: []
    # In prod il frontend e' buildato staticamente dentro l'immagine:
    # vuotiamo esplicitamente i volumes del base file cosi' il bind mount
    # di dev non oscura i file compilati.
    volumes: []
