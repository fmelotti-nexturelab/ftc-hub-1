services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      BACKUP_DESTINATION_LABEL: "G:\\Il mio Drive\\FTC_HUB_Backup"
    volumes:
      - ./backend:/app
      - attachments_data:/data/attachments
      - D:/:/mnt/f
      - "G:/Il mio Drive/FTC_HUB_Backup:/mnt/backup"
      # Vedi nota nel base: il router agent-installer legge da /navision_agent
      - ./navision_agent:/navision_agent:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    # In prod il frontend e' buildato staticamente (nginx statico).
    # Le parti dev-only (command, volumes, environment) vivono in
    # docker-compose.override.yml che NON viene letto in prod perche'
    # qui passiamo -f espliciti che disabilitano il merge automatico.
