<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FTC HUB — Login e Accesso</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; }
    header { background: #1e3a5f; color: white; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 20px; font-weight: 800; }
    header p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap-6px; }
    .back:hover { color: white; }
    main { max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .coming { background: white; border: 2px dashed #e2e8f0; border-radius: 16px; padding: 60px 40px; text-align: center; }
    .coming-icon { font-size: 48px; margin-bottom: 16px; }
    .coming h2 { font-size: 20px; font-weight: 700; color: #1e3a5f; margin-bottom: 8px; }
    .coming p { font-size: 14px; color: #64748b; }
    .close-btn { position: fixed; top: 16px; right: 24px; background: #ef4444; color: white; border: none; border-radius: 10px; padding: 10px 22px; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(239,68,68,0.4); transition: background 0.2s; z-index: 999; }
    .close-btn:hover { background: #dc2626; }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.close()">✕ Chiudi</button>
  <header>
    <div>
      <h1>🔐 Login e Accesso</h1>
      <p><a href="index.html" style="color:rgba(255,255,255,0.6);text-decoration:none;">← Torna alle guide</a></p>
    </div>
  </header>
  <main>
    <div class="coming">
      <div class="coming-icon">🚧</div>
      <h2>Guida in preparazione</h2>
      <p>Questa guida sarà disponibile a breve.</p>
    </div>
  </main>
</body>
</html>
