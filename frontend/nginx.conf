server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: tutte le route non-file vanno a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache lunga per asset con hash (JS, CSS, immagini)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache per index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
