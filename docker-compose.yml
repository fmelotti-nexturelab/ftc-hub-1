version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ftc_hub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ftc_hub
      POSTGRES_USER: ftc_admin
      POSTGRES_PASSWORD: changeme_in_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ftc_admin -d ftc_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ftc_hub_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ftc_admin:changeme_in_prod@db:5432/ftc_hub
      SECRET_KEY: supersecretkey_change_in_production
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: development
      TICKET_ATTACHMENTS_PATH: /data/attachments
      TICKET_NOTIFY_EMAIL: ""
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: ""
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AI_PROVIDER: anthropic
    volumes:
      - ./backend:/app
      - attachments_data:/data/attachments
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ftc_hub_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0 --port 3000

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ftc_hub_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - C:\certbot\letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  attachments_data:
